<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Noteworthy Planets</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/S1-Loading.css">
        <link rel="stylesheet" href="css/S2-MainMenu.css">
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="assets/favicon-16x16.png"
        >
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="assets/favicon-32x32.png"
        >
    </head>
    <body>
        <!--== Loading Screen ==-->
        <div id="S1" class="active">
            <div id="S1-Left">
                <img src="assets/PORTALSYMBOL.0.png" class="loadingGlyph">
                <img src="assets/PORTALSYMBOL.1.png" class="loadingGlyph">
                <img src="assets/PORTALSYMBOL.2.png" class="loadingGlyph">
            </div>
            <div id="S1-Center">
                <div id="S1-ImageHolder">
                    <img src="assets/Logo.png" id="S1-LoadingLogo">
                </div>
                <h1 id="S1-LoadingText">Loading...</h1>
            </div>
            <div id="S1-Right">
                <img src="assets/PORTALSYMBOL.3.png" class="loadingGlyph">
                <img src="assets/PORTALSYMBOL.4.png" class="loadingGlyph">
                <img src="assets/PORTALSYMBOL.5.png" class="loadingGlyph">
            </div>
        </div>
        <!--== Main Menu ==-->
        <div id="S2" class="screen">
            <div id="S2-Main">
                <div id="S2-Top">
                    <div id="S2-LogoFrame">
                        <img src="assets/Logo.png" alt="App Logo" id="S2-AppLogo">
                    </div>
                    <div id="S2-TitleAndInfo">
                        <div id="S2-TitleFrame">
                            <p id="S2-Title">Noteworthy Planets</p>
                        </div>
                        <div id="S2-AuthorAndInfo">
                            <p id="S2-Author">
                                By:
                                <a href="https://github.com/MerrickBro">MerrickBro</a>
                            </p>
                            <button id="S2-InfoButton" class="S3REDIRECT" onclick="switchScreen(`S3`)">
                                <img src="assets/Atlas.png" alt="App Info">
                            </button>
                        </div>
                    </div>
                </div>
                <div id="S2-Bottom">
                    <div id="S2-ButtonRow1">
                        <button id="S2-RefreshButton" class="S2-Button">
                            <img src="assets/PORTALSYMBOL.F.png" alt="Planet Fetcher">
                        </button>
                    </div>
                    <div id="S2-ButtonRow2">
                        <button id="S2-PlanetViewerButton" class="S4REDIRECT S2-Button" onclick="switchScreen(`S5`)">
                            View Planets
                        </button>
                        <button id="S2-PlanetSearcherButton" class="S7REDIRECT S2-Button" onclick="switchScreen(`S7`)">
                            Search Planets
                        </button>
                    </div>
                    <div id="S2-ButtonRow3">
                        <button id="S2-PlanetPosterButton" class="S8REDIRECT S2-Button" onclick="switchScreen(`S8`)">
                            Post Your Own Found Planet
                        </button>
                        <button id="S2-GlyphButton" class="S4REDIRECT S2-Button" onclick="switchScreen(`S4`)">
                            <img src="assets/PORTALSYMBOL.9.png" alt="Glyph Generator">
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!--== Info Screen ==-->
        <div id="S3" class="screen">
            <!-- HTML for info screen -->
        </div>

        <!--== Glyph Generator Screen ==-->
        <div id="S4" class="screen">
            <!-- HTML for glyph generator screen -->
        </div>
        
        <!--== Planet Viewing Screen ==-->
        <div id="S5" class="screen">
            <!-- HTML for planet viewing screen -->
        </div>
        
        <!--== Planet Info Screen ==-->
        <div id="S6" class="screen">
            <!-- HTML for planet info screen -->
        </div>
        
        <!--== Planet Search Screen ==-->
        <div id="S7" class="screen">
            <!-- HTML for planet search screen -->
        </div>
        
        <!--== Planet Post Screen ==-->
        <div id="S8" class="screen">
            <!-- HTML for planet post screen -->
        </div>

        <script src="js/app.js"></script>
    </body>
</html>
