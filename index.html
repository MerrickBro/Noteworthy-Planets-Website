<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noteworthy Planets</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/S1-Loading.css">
    <link rel="stylesheet" href="css/S2-MainMenu.css">
</head>

<body>
    <!--== Loading Screen ==-->
    <div id="S1" class="active">
        <div id="S1-Left">
            <img src="assets/PORTALSYMBOL.0.png" class="loadingGlyph">
            <img src="assets/PORTALSYMBOL.1.png" class="loadingGlyph">
            <img src="assets/PORTALSYMBOL.2.png" class="loadingGlyph">
        </div>
        <div id="S1-Center">
            <div id="S1-ImageHolder">
                <img src="assets/Logo.png" id="S1-LoadingLogo">
            </div>
            <h1 id="S1-LoadingText">Loading...</h1>
        </div>
        <div id="S1-Right">
            <img src="assets/PORTALSYMBOL.3.png" class="loadingGlyph">
            <img src="assets/PORTALSYMBOL.4.png" class="loadingGlyph">
            <img src="assets/PORTALSYMBOL.5.png" class="loadingGlyph">
        </div>
    </div>

    <!--== Main Menu ==-->
    <div id="S2" class="screen">
        <div id="S2-Main">
            <div id="S2-Top">
                <div id="S2-LogoFrame">
                    <img src="assets/Logo.png" alt="App Logo" id="S2-AppLogo">
                </div>
                <div id="S2-TitleAndInfo">
                    <div id="S2-TitleFrame">
                        <p id="S2-Title">Noteworthy Planets</p>
                    </div>
                    <div id="S2-AuthorAndInfo">
                        <p id="S2-Author">By: <a href="https://github.com/MerrickBro">MerrickBro</a></p>
                        <button id="S2-InfoButton" class="S3REDIRECT"></button>
                    </div>
                </div>
            </div>
            <div id="S2-Bottom">
                <div id="S2-ButtonRow1">
                    <button id="S2-RefreshButton"></button>
                </div>
                <div id="S2-ButtonRow2">
                    <button id="S2-PlanetViewerButton" class="S4REDIRECT">View Planets</button>
                    <button id="S2-PlanetSearcherButton" class="S7REDIRECT">Search Planets</button>
                </div>
                <div id="S2-ButtonRow3">
                    <button id="S2-PlanetPosterButton" class="S8REDIRECT">Post Your Own Found Planet</button>
                    <button id="S2-GlyphButton" class="S4REDIRECT"><img src="assets/PORTALSYMBOL.9.png" alt="Glyph Generator"></button>
                </div>
            </div>
        </div>
    </div>

    <!--== Info Screen ==-->
    <div id="S3" class="screen">
        <!-- HTML for info screen -->
    </div>

    <script src="js/app.js"></script>
</body>

</html>
